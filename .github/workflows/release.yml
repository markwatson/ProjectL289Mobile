name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - run: npm ci

      - name: Generate Android project
        run: npx expo prebuild --platform android --no-install

      - name: Build Android release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: android/app/build/outputs/apk/release/app-release.apk

  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate iOS project
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Build iOS app
        working-directory: ios
        run: |
          xcodebuild -workspace ProjectL289Mobile.xcworkspace \
            -scheme ProjectL289Mobile \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/ProjectL289Mobile.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO

      - name: Zip iOS app
        run: |
          cd ios/build/ProjectL289Mobile.xcarchive/Products/Applications
          zip -r "$GITHUB_WORKSPACE/ProjectL289Mobile.app.zip" ProjectL289Mobile.app

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: ProjectL289Mobile.app.zip

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    permissions:
      contents: write

    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            app-release.apk
            ProjectL289Mobile.app.zip
