name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Cache Android SDK packages
        uses: actions/cache@v4
        with:
          path: ~/.android/sdk
          key: android-sdk-${{ runner.os }}

      - run: npm ci

      - name: Cache expo prebuild
        id: expo-prebuild-cache
        uses: actions/cache@v4
        with:
          path: android
          key: expo-prebuild-${{ runner.os }}-${{ hashFiles('app.json', 'package-lock.json', 'modules/**') }}

      - name: Generate Android project
        if: steps.expo-prebuild-cache.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform android --no-install

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Android release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk ProjectL289_${GITHUB_REF_NAME}.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: ProjectL289_${{ github.ref_name }}.apk

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android]
    permissions:
      contents: write

    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ProjectL289_${{ github.ref_name }}.apk
