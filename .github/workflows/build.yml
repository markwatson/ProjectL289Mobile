name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx expo lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Cache Android SDK packages
        uses: actions/cache@v4
        with:
          path: ~/.android/sdk
          key: android-sdk-${{ runner.os }}

      - run: npm ci

      - name: Run JS tests
        run: npm test

      - name: Run Swift native module tests
        working-directory: modules/native-torch-transmitter/swift-tests
        run: swift test

      - name: Cache expo prebuild
        id: expo-prebuild-cache-test
        uses: actions/cache@v4
        with:
          path: android
          key: expo-prebuild-${{ runner.os }}-${{ hashFiles('app.json', 'package-lock.json', 'modules/**') }}

      - name: Generate Android project
        if: steps.expo-prebuild-cache-test.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform android --no-install

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Run Kotlin native module tests
        working-directory: android
        run: ./gradlew :native-torch-transmitter:testDebugUnitTest

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Cache Android SDK packages
        uses: actions/cache@v4
        with:
          path: ~/.android/sdk
          key: android-sdk-${{ runner.os }}

      - run: npm ci

      - name: Cache expo prebuild
        id: expo-prebuild-cache-build
        uses: actions/cache@v4
        with:
          path: android
          key: expo-prebuild-${{ runner.os }}-${{ hashFiles('app.json', 'package-lock.json', 'modules/**') }}

      - name: Generate Android project
        if: steps.expo-prebuild-cache-build.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform android --no-install

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Compile Android debug build
        working-directory: android
        run: ./gradlew compileDebugSources
